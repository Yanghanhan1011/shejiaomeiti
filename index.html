<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>短视频社交媒体传播效果</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f7ff;
            color: #1e293b;
            min-height: 100vh;
        }

        
        .header {
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
            padding: 28px 20px 22px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.25);
            position: relative;
            overflow: hidden;
        }
        .header::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            pointer-events: none;
        }
        .header h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }
        .header h1 span {
            font-weight: 300;
            opacity: 0.85;
        }
        .header .sub {
            color: rgba(255, 255, 255, 0.75);
            font-size: 14px;
            margin-top: 6px;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            border-radius: 14px;
            padding: 16px 24px;
            box-shadow: 0 2px 12px rgba(37, 99, 235, 0.08);
            margin-bottom: 24px;
            border: 1px solid #e2edff;
            gap: 12px;
        }
        .toolbar .left-group {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            flex: 1 1 320px;
        }
        .toolbar .search-wrap {
            display: flex;
            align-items: center;
            flex: 1 1 240px;
            position: relative;
        }
        .toolbar .search-wrap .icon {
            position: absolute;
            left: 14px;
            color: #94a3b8;
            font-size: 18px;
            pointer-events: none;
        }
        .toolbar .search-wrap input {
            width: 100%;
            padding: 10px 16px 10px 44px;
            border: 2px solid #dbeafe;
            border-radius: 40px;
            font-size: 15px;
            outline: none;
            transition: all 0.25s;
            background: #f8fbff;
            color: #1e293b;
        }
        .toolbar .search-wrap input:focus {
            border-color: #2563eb;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }
        .toolbar .search-wrap input::placeholder {
            color: #94a3b8;
        }
        .toolbar .search-wrap .clear-btn {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 18px;
            cursor: pointer;
            display: none;
            padding: 4px 6px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .toolbar .search-wrap .clear-btn:hover {
            background: #f1f5f9;
            color: #475569;
        }
        .toolbar .search-wrap .clear-btn.visible {
            display: block;
        }

        .btn {
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #2563eb;
            color: #fff;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
        }
        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .btn-outline {
            background: transparent;
            color: #475569;
            border: 1px solid #dbeafe;
        }
        .btn-outline:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }
        .btn-danger {
            background: #ef4444;
            color: #fff;
        }
        .btn-danger:hover {
            background: #dc2626;
        }

        .toolbar .stats {
            font-size: 14px;
            color: #475569;
            background: #eff6ff;
            padding: 6px 18px;
            border-radius: 40px;
            white-space: nowrap;
            border: 1px solid #dbeafe;
            margin-left: 4px;
        }
        .toolbar .stats strong {
            color: #1e40af;
            font-weight: 700;
        }

        .toolbar-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        
        .table-wrap {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(37, 99, 235, 0.08);
            border: 1px solid #e2edff;
            overflow: hidden;
        }
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0 2px 2px 2px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 900px;
        }

        table thead {
            background: #eff6ff;
            border-bottom: 2px solid #bfdbfe;
        }
        table thead th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: #1e40af;
            font-size: 13px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            position: sticky;
            top: 0;
            background: #eff6ff;
            z-index: 2;
        }
        table tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.15s;
        }
        table tbody tr:hover {
            background: #f8fbff;
        }
        table tbody tr:last-child {
            border-bottom: none;
        }
        table tbody td {
            padding: 12px 16px;
            vertical-align: middle;
            color: #1e293b;
            line-height: 1.5;
        }
        /* 序号列 */
        table tbody td:first-child {
            color: #64748b;
            font-weight: 500;
            font-size: 13px;
            text-align: center;
            width: 50px;
        }
        /* 主题列 */
        table tbody td:nth-child(2) {
            font-weight: 500;
            color: #1e40af;
            white-space: nowrap;
        }
        /* 标题列 */
        table tbody td:nth-child(3) {
            min-width: 180px;
            max-width: 300px;
            word-break: break-word;
        }
        /* 平台列 */
        table tbody td:nth-child(4) {
            white-space: nowrap;
        }
        /* 播放量列 */
        table tbody td:nth-child(5) {
            font-weight: 500;
            color: #0f172a;
            white-space: nowrap;
        }
        /* 点赞、评论、转发列 */
        table tbody td:nth-child(6),
        table tbody td:nth-child(7),
        table tbody td:nth-child(8) {
            text-align: center;
            font-weight: 500;
            color: #0f172a;
            white-space: nowrap;
        }
        /* 效果列 */
        table tbody td:nth-child(9) {
            max-width: 280px;
            word-break: break-word;
            color: #334155;
        }
        /* 操作列（删除按钮） */
        table tbody td:last-child {
            text-align: center;
            width: 60px;
        }

        /* 空值占位 */
        .empty-val {
            color: #b9c7da;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* 平台标签 */
        .platform-tag {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: #dbeafe;
            color: #1e40af;
        }
        .platform-tag.weibo {
            background: #fee2e2;
            color: #b91c1c;
        }
        .platform-tag.douyin {
            background: #e0f2fe;
            color: #0369a1;
        }
        .platform-tag.kuaishou {
            background: #fef3c7;
            color: #92400e;
        }
        .platform-tag.bilibili {
            background: #e0e7ff;
            color: #4338ca;
        }

        /* 效果列中的数字高亮 */
        .effect-highlight {
            color: #2563eb;
            font-weight: 500;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-state .big-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 16px;
        }

        /* 删除按钮 */
        .delete-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            color: #ef4444;
            background: #fee2e2;
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #ffffff;
            border-radius: 20px;
            max-width: 640px;
            width: 100%;
            padding: 32px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.25s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .modal h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1e40af;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .modal .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }
        .modal .form-group {
            flex: 1 1 calc(50% - 8px);
            min-width: 160px;
        }
        .modal .form-group.full {
            flex: 1 1 100%;
        }
        .modal label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 4px;
        }
        .modal input,
        .modal textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #dbeafe;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            background: #fafcff;
            font-family: inherit;
        }
        .modal input:focus,
        .modal textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
        }
        .modal textarea {
            resize: vertical;
            min-height: 60px;
        }
        .modal .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
            border-top: 1px solid #e2edff;
            padding-top: 20px;
        }
        .modal .btn-submit {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 10px 32px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal .btn-submit:hover {
            background: #1d4ed8;
        }
        .modal .btn-cancel {
            background: #e2e8f0;
            color: #334155;
            border: none;
            padding: 10px 32px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal .btn-cancel:hover {
            background: #cbd5e1;
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #f8fafc;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 14px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            visibility: visible;
            bottom: 40px;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
            }
            .header .sub {
                font-size: 12px;
            }
            .container {
                padding: 16px 12px 32px;
            }
            .toolbar {
                padding: 14px 16px;
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .toolbar .left-group {
                flex: 1 1 auto;
                flex-wrap: wrap;
            }
            .toolbar .search-wrap {
                flex: 1 1 auto;
            }
            .toolbar .stats {
                align-self: center;
                margin-left: 0;
            }
            .toolbar-actions {
                justify-content: center;
            }
            table {
                font-size: 13px;
                min-width: 780px;
            }
            table thead th,
            table tbody td {
                padding: 10px 12px;
            }
            table tbody td:nth-child(3) {
                min-width: 140px;
                max-width: 200px;
            }
            table tbody td:nth-child(9) {
                max-width: 180px;
            }
            .modal {
                padding: 24px 18px;
            }
            .modal .form-group {
                flex: 1 1 100%;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 19px;
            }
            table {
                font-size: 12px;
                min-width: 680px;
            }
            table thead th,
            table tbody td {
                padding: 8px 10px;
            }
            .toolbar .search-wrap input {
                font-size: 14px;
                padding: 8px 12px 8px 38px;
            }
            .platform-tag {
                font-size: 10px;
                padding: 1px 8px;
            }
        }

        /* 滚动条美化 */
        .table-scroll::-webkit-scrollbar {
            height: 6px;
            background: #eef2f6;
            border-radius: 4px;
        }
        .table-scroll::-webkit-scrollbar-thumb {
            background: #bfdbfe;
            border-radius: 4px;
        }
        .table-scroll::-webkit-scrollbar-thumb:hover {
            background: #93b4f0;
        }
    </style>
</head>

            comments: '',
            effect: ''
        }, {
            id: 14,
            theme: '我在高校等你来',
            title: '国防科大',
            platform: '',
            views: '',
            likes: '',
            comments: '',
            effect: ''
        }, {
            id: 15,
            theme: '我在高校等你来',
            title: '中央民族大学',
            platform: '',
            views: '',
            likes: '',
            comments: '',
            effect: ''
        }, {
            id: 16,
            theme: '高考',
            title: '《"等高考结束"这句话你说过多少遍》',
            platform: 'B站',
            views: '1.6万',
            likes: '328',
            comments: '514',
            effect: '518 登上抖音热榜第51位'
        }, {
            id: 17,
            theme: '',
            title: '【#社交一定要刻意表演吗#？】',
            platform: '',
            views: '',
            likes: '',
            comments: '',
            effect: ''
        }, {
            id: 18,
            theme: '',
            title: '【#选不对人生就废了吗#？】',
            platform: '',
            views: '',
            likes: '',
            comments: '',
            effect: ''
        }, {
            id: 19,
            theme: '',
            title: '新华网对话脱不花：【当你感到迷茫焦虑时，不妨听听这段话】',
            platform: '',
            views: '',
            likes: '',
            comments: '',
            effect: '登上抖音热榜第51位'
        }];

        // 加载数据
        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        return parsed;
                    }
                } catch (e) { /* 解析失败则重新初始化 */ }
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(INITIAL_DATA));
            return [...INITIAL_DATA];
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function getNextId(data) {
            const maxId = data.reduce((max, item) => Math.max(max, item.id || 0), 0);
            return maxId + 1;
        }

        // ================================================================
        //  2. 工具函数
        // ================================================================
        function isEmpty(val) {
            return val === undefined || val === null || val === '';
        }

        function emptyPlaceholder(val) {
            return isEmpty(val) ? '<span class="empty-val">—</span>' : val;
        }

        function getPlatformTag(platform) {
            if (!platform) return emptyPlaceholder('');
            const lower = platform.toLowerCase();
            let cls = 'platform-tag';
            if (lower.includes('微博') || lower.includes('weibo')) cls += ' weibo';
            else if (lower.includes('抖音') || lower.includes('douyin')) cls += ' douyin';
            else if (lower.includes('快手') || lower.includes('kuaishou')) cls += ' kuaishou';
            else if (lower.includes('b站') || lower.includes('bilibili')) cls += ' bilibili';
            return `<span class="${cls}">${platform}</span>`;
        }

        function splitForwardAndEffect(effectStr) {
            if (isEmpty(effectStr)) return { forward: '', effectDesc: '' };
            const str = String(effectStr).trim();
            const match = str.match(/^(\d+)\s*(.*)$/);
            if (match) {
                return { forward: match[1], effectDesc: match[2] ? match[2].trim() : '' };
            } else {
                return { forward: '', effectDesc: str };
            }
        }

        function formatEffectDesc(val) {
            if (isEmpty(val)) return emptyPlaceholder('');
            const str = String(val);
            const parts = str.split(/(\d+[,.]?\d*)/g);
            let result = '';
            for (let i = 0; i < parts.length; i++) {
                if (i % 2 === 1) {
                    result += `<span class="effect-highlight">${parts[i]}</span>`;
                } else {
                    result += parts[i];
                }
            }
            return result;
        }

        // 获取分组键（主题+标题）
        function getGroupKey(item) {
            const theme = item.theme || '';
            const title = item.title || '';
            return theme + '|||' + title;
        }

        // ================================================================
        //  3. 渲染（带分组合并序号）
        // ================================================================
        const tbody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const totalCount = document.getElementById('totalCount');

        let allData = [];

        // 分组渲染函数，传入数据数组（已过滤）
        function renderTable(data) {
            if (!data || data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10">
                            <div class="empty-state">
                                <div class="big-icon">📭</div>
                                <p>暂无数据，点击「添加数据」创建第一条记录</p>
                            </div>
                        </td>
                    </tr>
                `;
                totalCount.textContent = '0';
                return;
            }

            // 1. 分组：按照 theme+title 分组
            const groups = [];
            const groupMap = new Map();
            data.forEach(item => {
                const key = getGroupKey(item);
                if (!groupMap.has(key)) {
                    groupMap.set(key, []);
                }
                groupMap.get(key).push(item);
            });
            // 转为数组，每组包含 items 数组
            for (let [key, items] of groupMap.entries()) {
                // 按 id 排序保持稳定
                items.sort((a, b) => a.id - b.id);
                groups.push({ key, items });
            }

            // 2. 按第一项的 id 或序号排序（保持原有顺序）
            // 我们保留原顺序，按 groups 中最早出现的 id 排序
            groups.sort((a, b) => a.items[0].id - b.items[0].id);

            let html = '';
            let groupIndex = 1; // 组序号从1开始
            groups.forEach(group => {
                const items = group.items;
                const rowspan = items.length;

                items.forEach((item, idx) => {
                    const { forward, effectDesc } = splitForwardAndEffect(item.effect);
                    html += `<tr>`;
                    // 序号列：只有第一行显示序号，并使用 rowspan
                    if (idx === 0) {
                        html += `<td rowspan="${rowspan}">${groupIndex}</td>`;
                    }
                    // 其他列正常显示
                    // 主题、标题只在第一行显示并合并？但根据用户需求，主题和标题如果一致，也可以合并，但用户未明确要求，暂且不合并，保持每一行都显示（因为可能不同组但同一主题？但这里分组已经保证了主题+标题相同，所以每行主题和标题相同，但为了清晰，可以合并）-- 用户未要求合并主题和标题，所以保持每行都显示，但可以简化为只在第一行显示并合并，更美观。
                    // 为了更接近用户意图，我们把主题和标题也合并，只显示第一行，因为它们是相同的。
                    if (idx === 0) {
                        html += `<td rowspan="${rowspan}">${emptyPlaceholder(item.theme)}</td>`;
                        html += `<td rowspan="${rowspan}">${emptyPlaceholder(item.title)}</td>`;
                    } else {
                        // 后续行不显示主题和标题（留空或隐藏）
                        // 但为了保持表格结构，我们使用空单元格，但可能会留白，或者使用 style 隐藏？但为了表格对齐，我们插入空字符串。
                        // 更规范的做法是使用 rowspan，已经处理了。
                    }
                    // 但因为我们使用了 rowspan，所以后续行不需要再输出主题和标题的td了。
                    // 但必须保证列数正确，所以我们只输出平台及后面的列。
                    // 因此我们重构：只在 idx===0 时输出前三个td（序号、主题、标题），其余情况不输出这三个td。
                    // 但为了简便，我们这里采用 if-else 处理。
                    // 更清晰的写法：先判断 idx===0，输出完整行；否则输出从平台开始。
                    if (idx === 0) {
                        // 已经输出了序号、主题、标题（通过rowspan）
                        // 现在输出平台及后续
                        html += `<td>${getPlatformTag(item.platform)}</td>`;
                        html += `<td>${emptyPlaceholder(item.views)}</td>`;
                        html += `<td>${emptyPlaceholder(item.likes)}</td>`;
                        html += `<td>${emptyPlaceholder(item.comments)}</td>`;
                        html += `<td>${emptyPlaceholder(forward)}</td>`;
                        html += `<td>${formatEffectDesc(effectDesc)}</td>`;
                        html += `<td><button class="delete-btn" data-id="${item.id}" title="删除">✕</button></td>`;
                    } else {
                        // 后续行：不输出序号、主题、标题（因为已经被rowspan占用）
                        // 但我们需要输出平台及后面，并且删除按钮保留。
                        html += `<td>${getPlatformTag(item.platform)}</td>`;
                        html += `<td>${emptyPlaceholder(item.views)}</td>`;
                        html += `<td>${emptyPlaceholder(item.likes)}</td>`;
                        html += `<td>${emptyPlaceholder(item.comments)}</td>`;
                        html += `<td>${emptyPlaceholder(forward)}</td>`;
                        html += `<td>${formatEffectDesc(effectDesc)}</td>`;
                        html += `<td><button class="delete-btn" data-id="${item.id}" title="删除">✕</button></td>`;
                    }
                    html += `</tr>`;
                });
                groupIndex++;
            });

            tbody.innerHTML = html;
            totalCount.textContent = data.length; // 显示记录条数，而非分组数

            // 绑定删除事件
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id, 10);
                    if (confirm('确定要删除这条记录吗？')) {
                        allData = allData.filter(item => item.id !== id);
                        saveData(allData);
                        filterData(searchInput.value.trim());
                        showToast('✅ 已删除');
                    }
                });
            });
        }

        function filterData(keyword) {
            const trimmed = keyword.trim();
            let filtered;
            if (!trimmed) {
                filtered = allData;
                clearBtn.classList.remove('visible');
            } else {
                const lower = trimmed.toLowerCase();
                filtered = allData.filter(item => {
                    const theme = (item.theme || '').toLowerCase();
                    const title = (item.title || '').toLowerCase();
                    const platform = (item.platform || '').toLowerCase();
                    return theme.includes(lower) || title.includes(lower) || platform.includes(lower);
                });
                clearBtn.classList.add('visible');
            }
            renderTable(filtered);
        }

        function refreshData() {
            allData = loadData();
            filterData(searchInput.value);
        }

        // ================================================================
        //  4. Toast 提示
        // ================================================================
        let toastTimer = null;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // ================================================================
        //  5. 模态框（添加数据）
        // ================================================================
        const modalOverlay = document.getElementById('modalOverlay');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const addForm = document.getElementById('addForm');

        function openModal() {
            modalOverlay.classList.add('active');
            addForm.reset();
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        openModalBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) closeModal();
        });

        addForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const theme = document.getElementById('fTheme').value.trim();
            const platform = document.getElementById('fPlatform').value.trim();
            const title = document.getElementById('fTitle').value.trim();
            const views = document.getElementById('fViews').value.trim();
            const likes = document.getElementById('fLikes').value.trim();
            const comments = document.getElementById('fComments').value.trim();
            const forward = document.getElementById('fForward').value.trim();
            const effectDesc = document.getElementById('fEffect').value.trim();

            if (!title) {
                showToast('⚠️ 请至少填写“标题”字段');
                return;
            }

            let effect = '';
            if (forward) {
                effect = forward + (effectDesc ? ' ' + effectDesc : '');
            } else {
                effect = effectDesc;
            }

            const newRecord = {
                id: getNextId(allData),
                theme,
                platform,
                title,
                views,
                likes,
                comments,
                effect
            };

            allData.push(newRecord);
            saveData(allData);
            closeModal();
            filterData(searchInput.value);
            showToast('✅ 记录已保存');
        });

        // ================================================================
        //  6. 导出 / 导入
        // ================================================================
        document.getElementById('exportBtn').addEventListener('click', function() {
            const data = loadData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `短视频数据备份_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('📤 导出成功');
        });

        const fileInput = document.getElementById('fileInput');
        document.getElementById('importBtn').addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (!Array.isArray(imported) || imported.length === 0) {
                        showToast('⚠️ 无效的数据文件');
                        return;
                    }
                    saveData(imported);
                    refreshData();
                    showToast(`✅ 成功导入 ${imported.length} 条记录`);
                } catch (err) {
                    showToast('❌ 文件解析失败，请检查 JSON 格式');
                }
            };
            reader.readAsText(file);
            this.value = '';
        });

        // ================================================================
        //  7. 搜索事件
        // ================================================================
        searchInput.addEventListener('input', function() {
            filterData(this.value);
        });

        clearBtn.addEventListener('click', function() {
            searchInput.value = '';
            filterData('');
            searchInput.focus();
        });

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                this.value = '';
                filterData('');
                this.blur();
            }
        });

        // ================================================================
        //  8. 初始化
        // ================================================================
        refreshData();
    </script>
</body>
</html>
